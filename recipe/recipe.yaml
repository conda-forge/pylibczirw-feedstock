schema_version: 1

context:
  version: "6.0.1"

package:
  name: pylibczirw
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pylibCZIrw/pylibczirw-${{ version }}.tar.gz
  sha256: 9798a6883011dc00c8c16be2b8c6b08c8c1585d38b09c86c4bc738db8c4f7a71
  patches:
    - remove_cmake.patch

build:
  number: 0
  skip:
    - match(python, ">=3.14")
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler("cxx") }}
    - cmake >=3.18
    - make
    - ninja
  host:
    - python
    - setuptools >=42
    - packaging
    - pip
  run:
    - python
    - numpy
    - xmltodict
    - validators
    - packaging

tests:
  - python:
      imports:
        - pylibCZIrw
      pip_check: true

about:
  summary: A python wrapper around the libCZI C++ library with reading and writing functionality.
  license: LGPL-3.0-only AND BSD-3-Clause AND MIT AND GPL-3.0-only
  license_file:
    - COPYING.LESSER
    - libs/libCZIrw/THIRD_PARTY_LICENSES.txt
  homepage: https://pypi.org/project/pylibCZIrw/

extra:
  recipe-maintainers:
    - ocefpaf
